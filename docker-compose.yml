version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: testify-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: testify_db
    ports:
      - "5432:5432"
    volumes:
      - testify_pg_data:/var/lib/postgresql/data

volumes:
  testify_pg_data: